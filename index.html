<html>
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Birthday Surprise</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
            color: white;
            font-family: Arial;
        }

        /* Stars */
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.8);
            }
        }

        h1 {
            text-align: center;
            margin-top: 120px;
            font-size: 40px;
            color: pink;
            text-shadow: 0 0 20px white;
        }
    </style>

</head>

<body>

    <div class="container">
        <h1>✨Happy Birthday✨<br>Ansh</h1>
        <button onclick="window.location.href='second.html'">
            Open Your Card 🎁
        </button>

    </div>


    <script src="birthday button.js"></script>
</body>

</html>
